{% extends 'base.html' %}

{% block content %}
<h2>Attendance Records</h2>

<table>
<tr>
    <th>Name</th>
    <th>Date</th>
    <th>Status</th>
</tr>

{% for r in records %}
<tr>
    <td>{{ r.student.name }}</td>
    <td>{{ r.date }}</td>
    <td>
        {% if r.status %}
            Present
        {% else %}
            Absent
        {% endif %}
    </td>
</tr>
{% endfor %}

</table>
{% endblock %}
